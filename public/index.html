<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parker térkép</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="map-shell">
      <div id="map" aria-label="Térkép a közeli szabad parkolóhelyekkel"></div>
      <div id="status" class="status">Helyzet keresése...</div>
      <div class="filter-control" role="group" aria-label="Parkolóhely típus szűrő">
        <button class="filter-button" type="button" data-filter="all" aria-pressed="true">Mind</button>
        <button class="filter-button" type="button" data-filter="residential" aria-pressed="false">Lakossági</button>
        <button class="filter-button" type="button" data-filter="nonResidential" aria-pressed="false">Nem lakossági</button>
      </div>
      <div class="mode-control" role="group" aria-label="Keresési mód">
        <button
          id="locationModeButton"
          class="mode-button"
          type="button"
          data-mode="location"
          aria-pressed="true"
          aria-label="Keresés a jelenlegi helyzet körül"
          title="Jelenlegi helyzet"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z" />
            <circle cx="12" cy="10" r="2.5" />
          </svg>
        </button>
        <button
          id="mapModeButton"
          class="mode-button"
          type="button"
          data-mode="map"
          aria-pressed="false"
          aria-label="Keresés a térképen kijelölt hely körül"
          title="Keresés a térképen"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="6" />
            <path d="m16 16 4 4" />
            <path d="M11 8v6" />
            <path d="M8 11h6" />
          </svg>
        </button>
      </div>
      <button id="searchHereButton" class="search-here-button" type="button" hidden>Keresés itt</button>
      <div class="info-control">
        <button
          id="infoButton"
          class="info-button"
          type="button"
          aria-label="A Parker Web névjegye"
          aria-expanded="false"
          aria-controls="infoPanel"
          title="Névjegy"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" />
            <path d="M12 11v5" />
            <path d="M12 8h.01" />
          </svg>
        </button>
        <section id="infoPanel" class="info-panel" aria-label="A Parker Web névjegye" hidden>
          <h1>Parker Web</h1>
          <p>A Parker app webes változata, autós kijelzőre hangolva, hogy gyorsan találj szabad utcai parkolóhelyet.</p>
          <div class="info-links">
            <a href="https://github.com/biharygergo/parker-web" target="_blank" rel="noopener noreferrer">biharygergo/parker-web</a>
          </div>
        </section>
      </div>
      <button id="refreshButton" class="refresh-button" type="button" aria-label="Szabad parkolóhelyek frissítése" title="Frissítés">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M21 12a9 9 0 1 1-2.64-6.36" />
          <path d="M21 3v6h-6" />
        </svg>
      </button>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
