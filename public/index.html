<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parker Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="map-shell">
      <div id="map" aria-label="Map of available nearby parking spaces"></div>
      <div id="status" class="status">Finding your location...</div>
      <button id="refreshButton" class="refresh-button" type="button" aria-label="Refresh available parking spaces" title="Refresh">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M21 12a9 9 0 1 1-2.64-6.36" />
          <path d="M21 3v6h-6" />
        </svg>
      </button>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
